name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit dependencies
        run: composer audit

      - name: Code style (php-cs-fixer)
        run: composer cs
        env:
          PHP_CS_FIXER_IGNORE_ENV: '1'

      - name: Static analysis (PHPStan, level max)
        run: composer stan -- --no-progress

  test:
    name: PHP ${{ matrix.php }}${{ matrix.dependencies == 'lowest' && ' (lowest deps)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        dependencies: [highest]
        include:
          - php: '8.1'
            dependencies: lowest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (highest)
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Install dependencies (lowest)
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-dist --no-interaction --no-progress --prefer-lowest --prefer-stable

      - name: Tests with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text

      - name: Enforce coverage gate (>= 85% lines)
        run: php bin/coverage-gate.php coverage.xml 85
